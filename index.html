<style>
  @font-face {
    font-family: 'Manual';
    src: local('Manual');
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Manual', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    color: #1a1a1a;
  }

  .hero {
    height: 100vh;
    height: 100dvh;
    width: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .grid-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .grid-bg svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  nav {
    position: relative;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    flex-shrink: 0;
  }

  .logo {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }

  .logo .plus {
    font-weight: 300;
    font-size: 22px;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 40px;
    list-style: none;
  }

  .nav-links a {
    text-decoration: none;
    color: #555;
    font-size: 15px;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: #1a1a1a;
  }

  .login-btn {
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 8px 24px;
    text-decoration: none;
    color: #1a1a1a;
    font-size: 15px;
    font-weight: 400;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .login-btn:hover {
    background: #f5f5f5;
    border-color: #ccc;
  }

  /* Grid fade overlays */
  .grid-fade {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .grid-fade-left,
  .grid-fade-right {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 35%;
  }

  .grid-fade-left {
    left: 0;
    background: radial-gradient(ellipse 90% 80% at 30% 55%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 40%, transparent 70%);
  }

  .grid-fade-right {
    right: 0;
    background: radial-gradient(ellipse 90% 80% at 70% 55%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.7) 40%, transparent 70%);
  }

  /* 3D Characters */
  .hero-characters {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .character {
    position: absolute;
    bottom: 0;
    height: 88%;
    width: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    -webkit-mask-image:
      linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    mask-image:
      linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%),
      linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%);
    -webkit-mask-composite: destination-in;
    mask-composite: intersect;
  }

  .character-left {
    left: 2%;
  }

  .character-right {
    right: 2%;
  }

  /* Hero Content */
  .hero-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
    gap: 24px;
    z-index: 3;
  }

  .hero-heading {
    font-size: 80px;
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: #1a1a1a;
  }

  .hero-heading .magic {
    display: block;
    position: relative;
  }

  .hero-heading .sparkle {
    font-size: 28px;
    font-weight: 300;
    vertical-align: super;
    margin-left: 2px;
    display: inline-block;
    animation: sparkle-pulse 2s ease-in-out infinite;
  }

  @keyframes sparkle-pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  .hero-subtext {
    font-size: 18px;
    color: #777;
    font-weight: 400;
    line-height: 1.6;
    max-width: 400px;
  }

  /* CTA Button */
  .cta-wrapper {
    margin-top: 8px;
    position: relative;
    border-radius: 14px;
    padding: 1.5px;
    background: conic-gradient(
      from 0deg,
      #f87171,
      #fb923c,
      #facc15,
      #4ade80,
      #22d3ee,
      #818cf8,
      #e879f9,
      #f87171
    );
    background-size: 200% 200%;
    animation: gradient-rotate 4s linear infinite;
  }

  @keyframes gradient-rotate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .cta-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border: none;
    border-radius: 13px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 400;
    color: #1a1a1a;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }

  .cta-btn:hover {
    background: #fafafa;
  }

  .cta-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
  }

  /* Tablet */
  @media (max-width: 1024px) {
    .character {
      height: 75%;
    }

    .hero-heading {
      font-size: 64px;
    }
  }

  /* Mobile landscape & small tablets */
  @media (max-width: 768px) {
    nav {
      padding: 16px 20px;
    }

    .nav-links {
      gap: 20px;
    }

    .nav-links a {
      font-size: 13px;
    }

    .hero-heading {
      font-size: 44px;
    }

    .hero-subtext {
      font-size: 15px;
      max-width: 280px;
    }

    .character {
      height: 60%;
      bottom: 5%;
    }

    .character-left {
      left: -5%;
    }

    .character-right {
      right: -5%;
    }

    .grid-fade-left,
    .grid-fade-right {
      width: 40%;
    }
  }

  /* Mobile portrait */
  @media (max-width: 480px) {
    nav {
      padding: 14px 16px;
    }

    .nav-links {
      display: none;
    }

    .logo {
      font-size: 18px;
    }

    .hero-heading {
      font-size: 36px;
    }

    .hero-heading .sparkle {
      font-size: 18px;
    }

    .hero-subtext {
      font-size: 14px;
      max-width: 240px;
    }

    .cta-btn {
      padding: 12px 24px;
      font-size: 14px;
    }

    .character {
      height: 50%;
      bottom: 8%;
    }

    .character-left {
      left: -10%;
    }

    .character-right {
      right: -10%;
    }

    .grid-fade-left,
    .grid-fade-right {
      width: 45%;
    }
  }

  /* Very small phones */
  @media (max-width: 375px) {
    .hero-heading {
      font-size: 30px;
    }

    .hero-subtext {
      font-size: 13px;
      max-width: 220px;
    }

    .character {
      height: 45%;
    }
  }
</style>
</head>

      </g>
    </svg>

  <nav>
