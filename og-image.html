<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; background: #fff; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
.content { text-align: center; z-index: 1; }
.logo { font-size: 24px; font-weight: 500; color: #999; margin-bottom: 32px; letter-spacing: -0.02em; }
.logo span { font-weight: 300; }
h1 { font-size: 72px; font-weight: 400; line-height: 1.1; letter-spacing: -0.03em; color: #1a1a1a; }
p { font-size: 22px; color: #777; margin-top: 20px; }
.bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(to right, #f87171, #fb923c, #facc15, #4ade80, #22d3ee, #818cf8, #e879f9, #f87171); }
</style></head><body>
<div class="content">
  <div class="logo"><span>+</span> Sculpt OS</div>
  <h1>Your ideas into<br>3D Magic</h1>
  <p>Sketch, sculpt, and transform concepts into models in a few clicks.</p>
</div>
<div class="bar"></div>
</body></html>
